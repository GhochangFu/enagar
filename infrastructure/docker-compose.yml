# =================================================================
# eNagarSeba — Local development infrastructure
# Spin up with: pnpm infra:up
# Stop with:    pnpm infra:down
# Reset (wipe volumes): pnpm infra:reset
#
# All services listen on localhost. Production deployment uses Helm
# charts under infrastructure/helm/ (added in Phase 10).
# =================================================================

name: enagarseba

services:
  # ------------------------------------------------------------------
  # PostgreSQL 16 — primary database
  # ------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: enagar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./seed/init-postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [enagar]

  # ------------------------------------------------------------------
  # Redis — cache + BullMQ queue
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: enagar-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [enagar]

  # ------------------------------------------------------------------
  # MinIO — S3-compatible object storage (documents, certificates)
  # ------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: enagar-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [enagar]

  # ------------------------------------------------------------------
  # Keycloak — identity (citizens, staff, admins)
  # Uses a dedicated Postgres database for storage.
  # ------------------------------------------------------------------
  keycloak-db:
    image: postgres:16-alpine
    container_name: enagar-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      # Use container env (POSTGRES_*) — KEYCLOAK_DB_NAME is not exported inside this service.
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [enagar]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: enagar-keycloak
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "${KEYCLOAK_PORT}:8080"
    networks: [enagar]

  # ------------------------------------------------------------------
  # Qdrant — vector database for RAG (per-tenant collections)
  # ------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: enagar-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT}:6333"
      - "${QDRANT_GRPC_PORT}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [enagar]

  # ------------------------------------------------------------------
  # Ollama — OPTIONAL local LLM inference fallback (Llama 3.1 / Mistral)
  #
  # Per ADR-0008, the chatbot uses a provider adapter; production routes
  # to OpenAI / Gemini. Ollama is kept available for:
  #   • offline development (no internet / no API keys)
  #   • per-tenant override for sensitivity-conscious ULBs
  #   • future migration back to on-prem inference if GPUs are procured
  #
  # Started only when the `offline-llm` profile is requested:
  #   pnpm infra:up:offline      (or)
  #   docker compose --profile offline-llm up -d
  # ------------------------------------------------------------------
  ollama:
    image: ollama/ollama:0.3.6
    container_name: enagar-ollama
    restart: unless-stopped
    profiles: ["offline-llm"]
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks: [enagar]
    # GPU support (uncomment when GPU is available; harmless for CPU-only):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ------------------------------------------------------------------
  # Meilisearch — typo-tolerant search across services + FAQs
  # ------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: enagar-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: development
    ports:
      - "${MEILI_PORT}:7700"
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [enagar]

  # ------------------------------------------------------------------
  # Mailhog — captures outbound dev SMTP for visual inspection
  # UI: http://localhost:8025
  # ------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: enagar-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT}:1025"
      - "${MAILHOG_UI_PORT}:8025"
    networks: [enagar]

# =================================================================
networks:
  enagar:
    name: enagar
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  keycloak-db-data:
  qdrant-data:
  ollama-data:
  meili-data:
