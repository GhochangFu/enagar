name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  ts:
    name: TypeScript (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec turbo run lint --filter=!@enagar/rag-indexer-bridge -- --max-warnings=0

      - name: Typecheck
        run: pnpm exec turbo run typecheck --filter=!@enagar/rag-indexer-bridge

      - name: Test
        run: pnpm exec turbo run test --filter=!@enagar/rag-indexer-bridge

      - name: Security tests
        run: pnpm run test:security

      - name: Build
        run: pnpm run build

  portal-demo-build:
    name: Unified Portal demo staging build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build portals with demo NEXT_PUBLIC_* URLs
        run: pnpm run build:portal-demo

      - name: Verify demo URLs embedded in client bundles
        run: pnpm run verify:portal-demo

  ts-lighthouse:
    name: Citizen PWA Lighthouse
    runs-on: ubuntu-latest
    needs: ts
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @enagar/citizen-pwa build

      - name: Citizen PWA quality (Lighthouse)
        run: |
          pnpm --filter @enagar/citizen-pwa start &
          SERVER_PID=$!
          npx --yes wait-on@7.2.0 http://127.0.0.1:3000 -t 120000
          pnpm --filter @enagar/citizen-pwa run quality:ci
          kill $SERVER_PID

  python:
    name: Python (rag-indexer — ruff, mypy, pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/rag-indexer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          pipx install poetry==1.8.3
          poetry --version

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: services/rag-indexer/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('services/rag-indexer/poetry.lock', 'services/rag-indexer/pyproject.toml') }}

      - name: Install
        run: poetry install --no-interaction

      - name: Ruff
        run: poetry run ruff check src tests

      - name: Mypy
        run: poetry run mypy src

      - name: Pytest
        run: poetry run pytest

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: table

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Validate PR commit messages
        run: pnpm exec commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose
