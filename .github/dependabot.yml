version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      nest:
        patterns: ["@nestjs/*"]
      next:
        patterns: ["next", "eslint-config-next"]
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*"]
      types:
        patterns: ["@types/*"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/services/rag-indexer"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/infrastructure"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(infra)"
      include: "scope"
